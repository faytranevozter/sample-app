name: security-pipeline

on:
  pull_request:
  push:
    branches:
      - main
  schedule:
    - cron: "17 3 * * 1" # every Monday 03:17 UTC
  workflow_dispatch:

concurrency:
  group: security-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

# Default to least privilege. Raise only where needed per job.
permissions:
  contents: read

jobs:
  secret-scan:
    name: Secret scanning (Gitleaks)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: Checkout full history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  sast:
    name: SAST (Semgrep CE)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      actions: read
      security-events: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install Semgrep CE
        run: |
          python -m pip install --upgrade pip
          python -m pip install semgrep

      # Best practice for strict OSS-only usage:
      # keep your Semgrep rules in-repo under .semgrep/
      - name: Run Semgrep CE
        run: |
          test -d .semgrep
          semgrep scan \
            --config .semgrep/ \
            --sarif \
            --output semgrep.sarif \
            --error

      # Safe default: upload when the token can do it.
      # Public repos: works.
      # Private/internal repos: requires GitHub Code Security enabled.
      - name: Upload Semgrep SARIF
        if: always() && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.fork == false)
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: semgrep.sarif

      - name: Upload Semgrep artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: semgrep-sarif
          path: semgrep.sarif
          retention-days: 14

  sca:
    name: SCA (OSV-Scanner)
    # Fork PRs often do not have the permissions needed for SARIF upload.
    # This still covers push/schedule/manual and same-repo PRs.
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.fork == false
    permissions:
      actions: read
      contents: read
      security-events: write
    uses: google/osv-scanner-action/.github/workflows/osv-scanner-reusable.yml@v2.3.5
    with:
      scan-args: |-
        --recursive
        ./

  container-scan:
    name: Container scanning (Trivy)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      actions: read
      security-events: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Detect Dockerfile
        id: dockerfile
        shell: bash
        run: |
          if [[ -f Dockerfile ]]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build image
        if: ${{ steps.dockerfile.outputs.exists == 'true' }}
        run: |
          docker build --pull -t local/app:${{ github.sha }} .

      - name: Run Trivy
        if: ${{ steps.dockerfile.outputs.exists == 'true' }}
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: local/app:${{ github.sha }}
          format: sarif
          output: trivy.sarif
          severity: HIGH,CRITICAL
          vuln-type: os,library
          ignore-unfixed: true
          exit-code: "1"

      - name: Upload Trivy SARIF
        if: ${{ always() && steps.dockerfile.outputs.exists == 'true' && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.fork == false) }}
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy.sarif

      - name: Upload Trivy artifact
        if: ${{ always() && steps.dockerfile.outputs.exists == 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: trivy-sarif
          path: trivy.sarif
          retention-days: 14